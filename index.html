<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mundo dos Amigos - Início</title>

    <link rel="stylesheet" href="css/game.css">
</head>

<body>

<main class="container">

    <div 
        id="perfil-container" 
        role="button" 
        tabindex="0" 
        aria-label="Alterar foto do jogador"
    >

        <img 
            id="foto-jogador" 
            src="img/avatar-padrao.png" 
            alt="Foto do jogador"
        >

        <p>Toque na foto para mudar</p>

        <input 
            type="file" 
            id="inputFoto" 
            accept="image/*"
            style="display:none"
        >
    </div>

    <h1>Olá!</h1>

    <input 
        type="text" 
        id="nomeJogador" 
        placeholder="Digite seu nome..." 
        autocomplete="off"
        aria-label="Digite seu nome"
    >

    <div class="menu-materias" role="navigation" aria-label="Escolha a matéria">

        <button class="btn" data-materia="soma">SOMA (+)</button>
        <button class="btn" data-materia="subtracao">SUBTRAÇÃO (-)</button>
        <button class="btn" data-materia="divisao">DIVISÃO (÷)</button>

    </div>

</main>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- SCRIPTS -->
<script src="js/firebase.js"></script>
<script src="js/sons.js"></script>
<script src="js/voz.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const inputNome = document.getElementById("nomeJogador");
    const foto = document.getElementById("foto-jogador");
    const inputFoto = document.getElementById("inputFoto");
    const perfil = document.getElementById("perfil-container");
    const botoes = document.querySelectorAll(".btn");

    // FOTO
    try {
        const fotoSalva = localStorage.getItem("fotoJogador");
        if (fotoSalva && foto) foto.src = fotoSalva;
    } catch {}

    function abrirGaleria() {
        if (inputFoto) inputFoto.click();
    }

    perfil.addEventListener("click", abrirGaleria);
    perfil.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            abrirGaleria();
        }
    });

    // PROCESSAR FOTO
    inputFoto.addEventListener("change", (event) => {
        try {
            const arquivo = event.target.files[0];
            if (!arquivo) return;

            const leitor = new FileReader();

            leitor.onload = (e) => {
                const linkFoto = e.target.result;
                foto.src = linkFoto;
                localStorage.setItem("fotoJogador", linkFoto);
            };

            leitor.readAsDataURL(arquivo);

        } catch {}
    });

    // MÚSICA
    document.addEventListener("click", () => {
        if (typeof gerenciarMusicaFundo === "function") {
            gerenciarMusicaFundo("home");
        }
    }, { once: true });

    function nomeValido(nome) {
        return nome && nome.trim().length >= 2;
    }

    function iniciar(materia) {
        try {
            const nome = inputNome.value.trim();

            if (!nomeValido(nome)) {
                alert("Digite um nome válido!");
                return;
            }

            localStorage.setItem("nomeJogador", nome);
            localStorage.setItem("materiaAtual", materia);

            if (!localStorage.getItem("fotoJogador")) {
                localStorage.setItem("fotoJogador", "img/avatar-padrao.png");
            }

            // ✅ VOZ PADRÃO (CORRIGIDO)
            if (typeof falar === "function") {
                falar(`Olá ${nome}, vamos jogar ${materia}`);
            }

            botoes.forEach(b => b.disabled = true);

            setTimeout(() => {
                window.location.href = "game.html";
            }, 800);

        } catch (e) {
            console.error(e);
        }
    }

    botoes.forEach(btn => {
        btn.addEventListener("click", () => {
            const materia = btn.getAttribute("data-materia");
            iniciar(materia);
        });
    });

});
</script>

</body>
</html>
