<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4F46E5">
    <title>Mundo dos Amigos</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>

<button id="btn-mudo" aria-label="Liga/desliga som">🔊</button>

<main class="home-container">

    <!-- Avatar -->
    <div id="perfil-container" role="button" tabindex="0" aria-label="Alterar foto de perfil">
        <img id="foto-jogador" src="img/avatar-padrao.png" alt="Foto de perfil">
        <p>👆 Toque para mudar a foto</p>
        <input type="file" id="inputFoto" accept="image/*" style="display:none">
    </div>

    <!-- Título -->
    <h1 class="titulo-home">Mundo dos Amigos! 🌍</h1>

    <!-- Badge de conquistas -->
    <button class="badge-conquistas" id="badge-conquistas">
        🏆 <span id="txt-conq">0 Conquistas</span>
    </button>

    <!-- Nome -->
    <input type="text" id="nomeJogador"
        placeholder="✏️ Qual é o seu nome?"
        maxlength="15" autocomplete="off"
        aria-label="Digite seu nome">

    <!-- Operações -->
    <nav class="menu-materias" role="navigation" aria-label="Escolha a operação">
        <button class="btn-destaque" data-materia="soma">➕ SOMA</button>
        <button class="btn-destaque" data-materia="subtracao">➖ SUBTRAÇÃO</button>
        <button class="btn-destaque" data-materia="divisao">➗ DIVISÃO</button>
    </nav>

    <div class="info-card">🎮 30 fases &nbsp;·&nbsp; ⭐ Estrelas &nbsp;·&nbsp; 🏆 14 Conquistas</div>

</main>

<!-- Modal conquistas (montado por JS) -->
<div id="modal-cq" style="display:none"></div>

<script src="js/sons.js"></script>
<script src="js/voz.js"></script>
<script>
// ─── Elementos ────────────────────────────────────────
var inp      = document.getElementById('nomeJogador');
var botoes   = document.querySelectorAll('.btn-destaque');
var perfilEl = document.getElementById('perfil-container');
var inputFoto= document.getElementById('inputFoto');
var fotoEl   = document.getElementById('foto-jogador');
var txtConq  = document.getElementById('txt-conq');
var btnMudo  = document.getElementById('btn-mudo');
var badgeBtn = document.getElementById('badge-conquistas');

// ─── Avatar ───────────────────────────────────────────
perfilEl.onclick = function(){ inputFoto.click(); };
inputFoto.onchange = function(e) {
    var f = e.target.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function(ev) {
        fotoEl.src = ev.target.result;
        localStorage.setItem('fotoJogador', ev.target.result);
        if (typeof tocarSomClique==='function') tocarSomClique();
    };
    r.readAsDataURL(f);
};

// ─── Mudo ─────────────────────────────────────────────
function sincMudo() {
    var m = localStorage.getItem('mutado')==='true';
    btnMudo.textContent = m ? '🔇' : '🔊';
}
btnMudo.onclick = function() {
    if (typeof toggleMudo==='function') toggleMudo();
    sincMudo();
    if (typeof tocarSomClique==='function') tocarSomClique();
};
sincMudo();

// ─── Conquistas ───────────────────────────────────────
var DEF_CQ = [
    {id:'primeiro_acerto',icone:'⭐',titulo:'Primeira Estrela',  desc:'Acertou pela primeira vez!'},
    {id:'combo_3',        icone:'🔥',titulo:'Em Chamas!',        desc:'3 acertos seguidos!'},
    {id:'combo_5',        icone:'💥',titulo:'Combo x5',          desc:'5 acertos seguidos!'},
    {id:'combo_10',       icone:'🌟',titulo:'Imbatível',         desc:'10 acertos seguidos!'},
    {id:'fase_5',         icone:'🚀',titulo:'Decolando!',        desc:'Chegou na fase 5!'},
    {id:'fase_10',        icone:'🏅',titulo:'Persistente',       desc:'Chegou na fase 10!'},
    {id:'fase_20',        icone:'🥇',titulo:'Campeão',           desc:'Chegou na fase 20!'},
    {id:'pontos_50',      icone:'💎',titulo:'50 Pontos',         desc:'Acumulou 50 pontos!'},
    {id:'pontos_150',     icone:'👑',titulo:'150 Pontos',        desc:'150 pontos!'},
    {id:'pontos_300',     icone:'🌈',titulo:'300 Pontos',        desc:'300 pontos! Lenda!'},
    {id:'sem_erro_10',    icone:'🎯',titulo:'Perfeito!',         desc:'10 acertos sem errar!'},
    {id:'velocidade',     icone:'⚡',titulo:'Veloz!',            desc:'Respondeu em menos de 3s!'},
    {id:'divisao_mestre', icone:'🧮',titulo:'Mestre da Divisão', desc:'5 divisões seguidas!'},
    {id:'completo',       icone:'🎓',titulo:'Formado!',          desc:'Completou as 30 fases!'},
];

function atualizarBadge() {
    var t = JSON.parse(localStorage.getItem('conquistas')||'[]').length;
    txtConq.textContent = t===0 ? '0 Conquistas' : t+' Conquista'+(t>1?'s':'')+'!';
}

badgeBtn.onclick = function() {
    if (typeof tocarSomClique==='function') tocarSomClique();
    var modal = document.getElementById('modal-cq');
    var desbl = new Set(JSON.parse(localStorage.getItem('conquistas')||'[]'));
    modal.innerHTML =
        '<div onclick="if(event.target===this)fecharCQ()" style="position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px);">'+
        '<div style="background:linear-gradient(145deg,#0d1b2a,#1a2744);border-radius:26px;padding:20px;width:100%;max-width:380px;max-height:84dvh;overflow-y:auto;border:1.5px solid rgba(255,215,0,.3);box-shadow:0 30px 80px rgba(0,0,0,.6);">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">'+
        '<div><div style="color:#FFD700;font-weight:900;font-size:1.45rem;">🏆 Conquistas</div>'+
        '<div style="color:rgba(255,255,255,.5);font-size:.8rem;margin-top:2px;">'+desbl.size+'/'+DEF_CQ.length+' desbloqueadas</div></div>'+
        '<button onclick="fecharCQ()" style="background:rgba(255,255,255,.1);border:none;color:white;font-size:1.3rem;cursor:pointer;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;">✕</button></div>'+
        DEF_CQ.map(function(c){
            var ok=desbl.has(c.id);
            return '<div style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:13px;margin-bottom:7px;background:'+(ok?'rgba(255,215,0,.08)':'rgba(255,255,255,.03)')+';border:1.5px solid '+(ok?'rgba(255,215,0,.22)':'transparent')+';">'+
            '<span style="font-size:1.85rem;flex-shrink:0;filter:'+(ok?'none':'grayscale(1) opacity(.22)')+';">'+c.icone+'</span>'+
            '<div style="flex:1;"><div style="color:'+(ok?'#f8fafc':'#555')+';font-weight:800;font-size:.92rem;">'+c.titulo+'</div>'+
            '<div style="color:'+(ok?'rgba(255,255,255,.55)':'#3a3a3a')+';font-size:.75rem;margin-top:1px;">'+c.desc+'</div></div>'+
            (ok?'<span style="color:#22C55E;font-size:1rem;">✓</span>':'<span style="color:#2a2a2a;font-size:.9rem;">🔒</span>')+'</div>';
        }).join('')+
        '</div></div>'+
        '<style>@keyframes mcIn{from{opacity:0}to{opacity:1}}</style>';
    modal.style.display='block';
};

function fecharCQ() {
    var m=document.getElementById('modal-cq');
    m.style.display='none'; m.innerHTML='';
}

// ─── Iniciar ──────────────────────────────────────────
function iniciar(materia) {
    var raw  = inp.value.trim();
    var nome = !raw ? 'Jogador' : raw.charAt(0).toUpperCase()+raw.slice(1).toLowerCase();
    if (typeof tocarSomClique==='function') tocarSomClique();
    localStorage.setItem('nomeJogador', nome);
    localStorage.setItem('modoJogo', materia);
    if (!localStorage.getItem('fotoJogador')) localStorage.setItem('fotoJogador','img/avatar-padrao.png');
    if (typeof falar==='function') falar('Olá '+nome+'! Vamos jogar!','festa');
    botoes.forEach(function(b){ b.disabled=true; });
    document.body.classList.add('fade-out');
    setTimeout(function(){ window.location.href='game.html'; }, 370);
}

botoes.forEach(function(b){ b.addEventListener('click',function(){ iniciar(b.dataset.materia); }); });
inp.addEventListener('keypress', function(e){ if(e.key==='Enter') iniciar('soma'); });

// ─── Init ─────────────────────────────────────────────
window.addEventListener('load', function() {
    var nome=localStorage.getItem('nomeJogador'), foto=localStorage.getItem('fotoJogador');
    if (nome&&nome!=='Jogador') inp.value=nome;
    if (foto) fotoEl.src=foto;
    atualizarBadge();
    document.body.classList.add('loaded');

    // Música home após primeiro toque
    document.addEventListener('pointerdown', function im(){
        document.removeEventListener('pointerdown',im);
        if (typeof gerenciarMusicaFundo==='function') gerenciarMusicaFundo('home');
    });

    // Voz de boas-vindas
    setTimeout(function(){
        var n=localStorage.getItem('nomeJogador')||'';
        if (typeof falar==='function'&&n&&n!=='Jogador') falar('Olá '+n+'! Que bom ter você aqui!','festa');
    }, 2000);
});
</script>
</body>
</html>
