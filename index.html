<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Amigos - Início</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

    <main class="container">
        <div 
            id="perfil-container" 
            role="button" 
            tabindex="0" 
            aria-label="Alterar foto do jogador"
        >
            <img 
                id="foto-jogador" 
                src="img/avatar-padrao.png" 
                alt="Sua foto de perfil"
            >
            <p>Toque na foto para mudar</p>
            <input 
                type="file" 
                id="inputFoto" 
                accept="image/*"
                style="display:none"
            >
        </div>

        <h1>Olá Amigo!</h1>

        <input 
            type="text" 
            id="nomeJogador" 
            placeholder="Qual o seu nome?" 
            maxlength="15"
            autocomplete="off"
            aria-label="Digite seu nome"
        >

        <nav class="menu-materias" role="navigation" aria-label="Escolha uma operação">
            <button class="btn btn-destaque" data-materia="soma">SOMA (+)</button>
            <button class="btn btn-destaque" data-materia="subtracao">SUBTRAÇÃO (−)</button>
            <button class="btn btn-destaque" data-materia="divisao">DIVISÃO (÷)</button>
        </nav>
    </main>

    <script src="js/sons.js"></script>
    <script src="js/voz.js"></script>

    <script>
        /**
         * 1. DESBLOQUEIO DE ÁUDIO PADRONIZADO (FIX MOBILE)
         * Substitui o antigo botão invisível pelo toque em qualquer lugar da tela.
         */
        document.addEventListener("pointerdown", () => {
            if (typeof liberarAudio === "function") liberarAudio();
            if (typeof liberarVoz === "function") liberarVoz();

            if (typeof gerenciarMusicaFundo === "function") {
                gerenciarMusicaFundo("home");
            }
            console.log("[SISTEMA]: Áudio e Trilha 'Home' desbloqueados pelo toque.");
        }, { once: true });

        // --- Lógica de Interface da Home ---
        const inputFoto = document.getElementById("inputFoto");
        const fotoJogador = document.getElementById("foto-jogador");
        const perfilContainer = document.getElementById("perfil-container");
        const inputNome = document.getElementById("nomeJogador");
        const botoes = document.querySelectorAll(".btn-destaque");

        // 2. GESTÃO DE FOTO DE PERFIL
        perfilContainer.addEventListener("click", () => inputFoto.click());

        inputFoto.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64 = event.target.result;
                    fotoJogador.src = base64;
                    localStorage.setItem("fotoJogador", base64);
                    if (typeof tocarSom === "function") tocarSom('clique');
                };
                reader.readAsDataURL(file);
            }
        });

        // 3. INICIALIZAÇÃO DO JOGO
        function iniciar(materia) {
            const nome = inputNome.value.trim() || "Amigo";
            
            if (typeof tocarSom === "function") tocarSom('clique');

            localStorage.setItem("nomeJogador", nome);
            localStorage.setItem("modoJogo", materia);

            if (!localStorage.getItem("fotoJogador")) {
                localStorage.setItem("fotoJogador", "img/avatar-padrao.png");
            }

            if (typeof falar === "function") {
                falar(`Olá ${nome}, vamos jogar ${materia}!`);
            }

            botoes.forEach(b => b.disabled = true);

            setTimeout(() => {
                window.location.href = "game.html";
            }, 1000);
        }

        botoes.forEach(btn => {
            btn.addEventListener("click", () => {
                const materiaSelecionada = btn.getAttribute("data-materia");
                iniciar(materiaSelecionada);
            });
        });

        // Recuperar nome salvo
        const nomeSalvo = localStorage.getItem("nomeJogador");
        if (nomeSalvo) {
            inputNome.value = nomeSalvo;
        }

        const fotoSalva = localStorage.getItem("fotoJogador");
        if (fotoSalva) {
            fotoJogador.src = fotoSalva;
        }
    </script>
</body>
</html>
