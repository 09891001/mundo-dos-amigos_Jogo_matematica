<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Amigos - Início</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

    <button id="ativarAudio" aria-label="Ativar som do jogo"></button>

    <main class="container">
        <div 
            id="perfil-container" 
            role="button" 
            tabindex="0" 
            aria-label="Alterar foto do jogador"
        >
            <img 
                id="foto-jogador" 
                src="img/avatar-padrao.png" 
                alt="Sua foto de perfil"
            >
            <p>Toque na foto para mudar</p>
            <input 
                type="file" 
                id="inputFoto" 
                accept="image/*"
                style="display:none"
            >
        </div>

        <h1>Olá Amigo!</h1>

        <input 
            type="text" 
            id="nomeJogador" 
            placeholder="Qual o seu nome?" 
            maxlength="15"
            autocomplete="off"
            aria-label="Digite seu nome"
        >

        <nav class="menu-materias" role="navigation" aria-label="Escolha uma operação">
            <button class="btn btn-destaque" data-materia="soma">SOMA (+)</button>
            <button class="btn" data-materia="subtracao">SUBTRAÇÃO (-)</button>
            <button class="btn" data-materia="divisao">DIVISÃO (÷)</button>
        </nav>
    </main>

    <script src="js/sons.js"></script>
    <script src="js/voz.js"></script>

    <script>
        const btnAudio = document.getElementById("ativarAudio");
        const inputFoto = document.getElementById("inputFoto");
        const fotoJogador = document.getElementById("foto-jogador");
        const perfilContainer = document.getElementById("perfil-container");
        const inputNome = document.getElementById("nomeJogador");
        const botoes = document.querySelectorAll(".btn");

        // 1. DESBLOQUEIO DE HARDWARE DE ÁUDIO
        btnAudio.addEventListener("click", () => {
            // Libera o contexto de áudio e síntese de voz do navegador
            if (typeof liberarAudio === "function") liberarAudio();
            if (typeof liberarVoz === "function") liberarVoz();
            
            // Inicia trilha sonora se disponível
            if (typeof gerenciarMusicaFundo === "function") {
                gerenciarMusicaFundo("home");
            }

            btnAudio.remove(); // Remove o bloqueador após o primeiro toque
            console.log("[SISTEMA]: Áudio e Voz liberados.");
        });

        // 2. GESTÃO DA FOTO DE PERFIL
        perfilContainer.addEventListener("click", () => inputFoto.click());

        inputFoto.addEventListener("change", (e) => {
            const arquivo = e.target.files[0];
            if (arquivo) {
                const leitor = new FileReader();
                leitor.onload = (event) => {
                    const linkFoto = event.target.result;
                    fotoJogador.src = linkFoto;
                    localStorage.setItem("fotoJogador", linkFoto);
                };
                leitor.readAsDataURL(arquivo);
            }
        });

        // Recupera a foto salva anteriormente
        const fotoSalva = localStorage.getItem("fotoJogador");
        if (fotoSalva) {
            fotoJogador.src = fotoSalva;
        }

        // 3. FUNÇÃO DE INÍCIO DO JOGO (COM MODO DINÂMICO)
        function iniciar(materia) {
            const nome = inputNome.value.trim();
            
            // Validação mínima de nome
            if (nome.length < 2) {
                alert("Por favor, digite seu nome para começar a aventura!");
                return;
            }

            // SALVAMENTO DE DADOS PARA O MOTOR DO JOGO (GAME.JS)
            localStorage.setItem("nomeJogador", nome);
            localStorage.setItem("modoJogo", materia); // Sincronizado com a engine unificada

            // Garante que haja uma foto padrão caso nenhuma tenha sido escolhida
            if (!localStorage.getItem("fotoJogador")) {
                localStorage.setItem("fotoJogador", "img/avatar-padrao.png");
            }

            // Feedback por voz personalizado
            if (typeof falar === "function") {
                falar(`Olá ${nome}, vamos jogar ${materia}!`);
            }

            // Desabilita botões para evitar cliques múltiplos durante a transição
            botoes.forEach(b => b.disabled = true);

            // Pequeno atraso para o áudio da voz ser processado antes da troca de página
            setTimeout(() => {
                window.location.href = "game.html";
            }, 1000);
        }

        // 4. ATRIBUIÇÃO DE EVENTOS AOS BOTÕES DO MENU
        botoes.forEach(btn => {
            btn.addEventListener("click", () => {
                const materiaSelecionada = btn.getAttribute("data-materia");
                iniciar(materiaSelecionada);
            });
        });

        // Recupera o nome salvo anteriormente para facilitar o retorno
        const nomeSalvo = localStorage.getItem("nomeJogador");
        if (nomeSalvo) {
            inputNome.value = nomeSalvo;
        }
    </script>
</body>
</html>
