<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo dos Amigos - Início</title>
    <link rel="stylesheet" href="./css/app.css">
    <link rel="stylesheet" href="./css/game.css">
</head>
<body>
<main class="container">
    <div id="perfil-container" role="button" tabindex="0" aria-label="Toque para mudar sua foto">
        <img id="foto-jogador" src="./img/avatar-padrao.png" alt="Foto do jogador" onerror="this.src='./img/avatar-padrao.png'">
        <p>Toque na foto para mudar</p>
        <input type="file" id="inputFoto" accept="image/*" style="display:none">
    </div>
    <h1>Mundo dos Amigos</h1>
    <div class="flex-column" style="width: 100%; align-items: center;">
        <input type="text" id="nomeJogador" placeholder="Qual é o seu nome?" aria-label="Digite seu nome" maxlength="15">
    </div>
    <div class="menu-materias">
        <button class="btn" data-materia="soma">SOMA (+)</button>
        <button class="btn" data-materia="subtracao">SUBTRAÇÃO (-)</button>
        <button class="btn" data-materia="divisao">DIVISÃO (÷)</button>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="./js/firebase.js"></script>
<script src="./js/voz.js"></script>
<script src="./js/sons.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const inputNome = document.getElementById("nomeJogador");
    const botoes = document.querySelectorAll(".btn");

    // ATIVAÇÃO DE ÁUDIO PARA IPHONE (iOS)
    // O iPhone só libera som após um toque real do usuário
    const ativarAudio = () => {
        if (typeof gerenciarMusicaFundo === "function") {
            gerenciarMusicaFundo("home");
        }
        // Desbloqueia o motor de voz do iOS
        if ('speechSynthesis' in window) {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        }
        document.removeEventListener("click", ativarAudio);
        document.removeEventListener("touchstart", ativarAudio);
    };
    document.addEventListener("click", ativarAudio);
    document.addEventListener("touchstart", ativarAudio);

    function iniciar(materia) {
        const nome = inputNome.value.trim();
        if (nome.length < 2) {
            if (typeof falar === "function") falar("Diga seu nome primeiro!", "erro");
            return;
        }
        localStorage.setItem("nomeJogador", nome);
        localStorage.setItem("materiaAtual", materia);
        
        if (typeof tocarSom === "function") tocarSom('clique');
        if (typeof falar === "function") falar(`Vamos lá ${nome}!`, "pergunta");

        setTimeout(() => { window.location.href = "./game.html"; }, 1000);
    }

    botoes.forEach(btn => {
        btn.addEventListener("click", () => iniciar(btn.getAttribute("data-materia")));
        btn.addEventListener("touchstart", (e) => { 
            e.preventDefault(); 
            iniciar(btn.getAttribute("data-materia")); 
        });
    });
});
</script>
</body>
</html>
