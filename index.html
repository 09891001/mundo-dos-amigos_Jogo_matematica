<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Amigos - Início</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

    <button id="ativarAudio" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        z-index: 9999;
        border: none;
        background: transparent;
    "></button>

    <main class="container">
        <div 
            id="perfil-container" 
            role="button" 
            tabindex="0" 
            aria-label="Alterar foto do jogador"
        >
            <img 
                id="foto-jogador" 
                src="img/avatar-padrao.png" 
                alt="Foto do jogador"
            >
            <p>Toque na foto para mudar</p>
            <input 
                type="file" 
                id="inputFoto" 
                accept="image/*"
                style="display:none"
            >
        </div>

        <h1>Olá!</h1>

        <input 
            type="text" 
            id="nomeJogador" 
            placeholder="Digite seu nome..." 
            autocomplete="off"
            aria-label="Digite seu nome"
        >

        <div class="menu-materias" role="navigation" aria-label="Escolha a matéria">
            <button class="btn" data-materia="soma">SOMA (+)</button>
            <button class="btn" data-materia="subtracao">SUBTRAÇÃO (-)</button>
            <button class="btn" data-materia="divisao">DIVISÃO (÷)</button>
        </div>
    </main>

    <script src="js/sons.js"></script>
    <script src="js/voz.js"></script>

    <script>
        // 1. Elementos do DOM
        const btnAudio = document.getElementById("ativarAudio");
        const inputFoto = document.getElementById("inputFoto");
        const fotoJogador = document.getElementById("foto-jogador");
        const perfilContainer = document.getElementById("perfil-container");
        const inputNome = document.getElementById("nomeJogador");
        const botoes = document.querySelectorAll(".btn");

        // 2. 🔥 Desbloqueio de Áudio/Voz (Gatilho Limpo)
        btnAudio.addEventListener("click", () => {
            if (typeof liberarAudio === "function") liberarAudio();
            if (typeof liberarVoz === "function") liberarVoz();

            if (typeof gerenciarMusicaFundo === "function") {
                gerenciarMusicaFundo("home");
            }

            btnAudio.remove();
            console.log("[SISTEMA]: Hardware liberado.");
        });

        // 3. Gerenciamento de Perfil (Foto)
        perfilContainer.addEventListener("click", () => inputFoto.click());

        inputFoto.addEventListener("change", (e) => {
            const arquivo = e.target.files[0];
            if (arquivo) {
                const leitor = new FileReader();
                leitor.onload = (event) => {
                    const linkFoto = event.target.result;
                    fotoJogador.src = linkFoto;
                    localStorage.setItem("fotoJogador", linkFoto);
                };
                leitor.readAsDataURL(arquivo);
            }
        });

        // Restaurar foto salva
        const fotoSalva = localStorage.getItem("fotoJogador");
        if (fotoSalva) fotoJogador.src = fotoSalva;

        // 4. Lógica de Início de Jogo
        function nomeValido(nome) {
            return nome && nome.trim().length >= 2;
        }

        function iniciar(materia) {
            const nome = inputNome.value.trim();

            if (!nomeValido(nome)) {
                alert("Digite um nome válido!");
                return;
            }

            localStorage.setItem("nomeJogador", nome);
            localStorage.setItem("materiaAtual", materia);

            if (!localStorage.getItem("fotoJogador")) {
                localStorage.setItem("fotoJogador", "img/avatar-padrao.png");
            }

            if (typeof falar === "function") {
                falar(`Olá ${nome}, vamos jogar ${materia}`);
            }

            botoes.forEach(b => b.disabled = true);

            setTimeout(() => {
                window.location.href = "game.html";
            }, 800);
        }

        botoes.forEach(btn => {
            btn.addEventListener("click", () => {
                const materia = btn.getAttribute("data-materia");
                iniciar(materia);
            });
        });
    </script>
</body>
</html>
