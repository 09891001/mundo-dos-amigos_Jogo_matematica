<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4F46E5">
    <title>Mundo dos Amigos — Parabéns!</title>
    <link rel="stylesheet" href="css/app.css">
    <style>
        body { opacity:0; transition:opacity .35s ease; justify-content:center; }
        body.loaded { opacity:1; }
        .end-card {
            background:rgba(255,255,255,0.65);
            backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
            border:1.5px solid rgba(255,255,255,0.7);
            border-radius:28px; padding:32px 28px;
            display:flex; flex-direction:column; align-items:center;
            gap:16px; width:100%; max-width:400px;
            box-shadow:0 20px 60px rgba(0,0,0,0.12);
            animation:slideUp .5s cubic-bezier(.4,2,.6,1);
            text-align:center;
        }
        .end-titulo {
            font-size:2.6rem; font-weight:900;
            background:linear-gradient(135deg,#4F46E5,#8B5CF6,#EC4899);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .end-score {
            font-size:3.5rem; font-weight:900; color:#4F46E5;
            background:linear-gradient(135deg,#F59E0B,#EF4444);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .end-info { font-size:1.3rem; font-weight:700; color:#64748B; }
        .end-conquistas {
            font-size:1.25rem; font-weight:800; color:#92400E;
            background:rgba(255,215,0,0.15); border:1.5px solid rgba(255,215,0,0.35);
            border-radius:16px; padding:10px 20px;
        }
        .btn-jogar-novamente {
            width:100%; padding:18px;
            background:linear-gradient(135deg,#4F46E5,#7C3AED);
            color:white; border:none; border-radius:20px;
            font-size:1.7rem; font-weight:900;
            cursor:pointer; box-shadow:0 10px 28px rgba(79,70,229,.4);
            transition:all .2s ease; position:relative; overflow:hidden;
        }
        .btn-jogar-novamente::before {
            content:'';position:absolute;inset:0;border-radius:inherit;
            background:linear-gradient(180deg,rgba(255,255,255,.15),transparent);
        }
        .btn-jogar-novamente:active { transform:scale(0.96); }
        .btn-home {
            width:100%; padding:15px;
            background:rgba(255,255,255,0.7);
            color:#4F46E5; border:1.5px solid rgba(255,255,255,.6);
            border-radius:18px; font-size:1.5rem; font-weight:900;
            cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,.07);
            transition:all .2s ease;
        }
        .btn-home:active { transform:scale(0.96); }
        .estrelas-row { font-size:2rem; letter-spacing:4px; }
    </style>
</head>
<body>

<main class="home-container">
    <div class="end-card">
        <div style="font-size:5rem;">🎓</div>
        <div class="end-titulo" id="end-titulo">Incrível!</div>
        <div class="estrelas-row" id="end-estrelas">⭐⭐⭐</div>
        <div class="end-score" id="end-score">0 pts</div>
        <div class="end-info" id="end-info">Você completou as 30 fases!</div>
        <div class="end-conquistas" id="end-conquistas">🏆 0 Conquistas desbloqueadas</div>
        <button class="btn-jogar-novamente" id="btn-novo">🎮 Jogar Novamente</button>
        <button class="btn-home" id="btn-home">🏠 Início</button>
    </div>
</main>

<script src="js/sons.js"></script>
<script src="js/voz.js"></script>
<script>
window.addEventListener('load', function() {
    var score    = parseInt(localStorage.getItem('mostRecentScore') || '0');
    var estrelas = parseInt(localStorage.getItem('estrelas') || '0');
    var nome     = localStorage.getItem('nomeJogador') || 'Campeão';
    var nConq    = JSON.parse(localStorage.getItem('conquistas')||'[]').length;

    document.getElementById('end-titulo').textContent  = 'Parabéns, '+nome+'!';
    document.getElementById('end-score').textContent   = score + ' pontos!';
    document.getElementById('end-info').textContent    = 'Você completou as 30 fases! 🎉';
    document.getElementById('end-conquistas').textContent = '🏆 '+nConq+' Conquista'+(nConq!==1?'s':'')+' desbloqueada'+(nConq!==1?'s':'')+'!';

    // Estrelas
    var stStr = '';
    for(var i=0;i<Math.min(estrelas,10);i++) stStr+='⭐';
    document.getElementById('end-estrelas').textContent = stStr || '⭐';

    // Confetes e sons
    soltarConfetes();
    setTimeout(function() {
        if (typeof tocarSomFinal==='function') tocarSomFinal();
        setTimeout(function(){
            if(typeof falar==='function')
                falar('Parabéns '+nome+'! Você é incrível! Você marcou '+score+' pontos e desbloqueou '+nConq+' conquistas!','festa');
        }, 500);
    }, 300);

    document.body.classList.add('loaded');
});

function soltarConfetes() {
    var cores=['#22C55E','#4F46E5','#F59E0B','#EF4444','#EC4899','#06B6D4'];
    for(var i=0;i<60;i++){
        (function(ii){
            setTimeout(function(){
                var c=document.createElement('div');
                c.style.cssText='position:fixed;top:-12px;left:'+Math.random()*100+'vw;width:'+(4+Math.random()*8)+'px;height:'+(4+Math.random()*8)+'px;background:'+cores[~~(Math.random()*cores.length)]+';border-radius:'+(Math.random()>.5?'50%':'2px')+';pointer-events:none;z-index:9999;animation:confeteCair '+(0.9+Math.random())*1.1+'s ease-out forwards;';
                document.body.appendChild(c);
                setTimeout(function(){if(c.parentNode)c.remove();},2500);
            },ii*60);
        })(i);
    }
}

document.getElementById('btn-novo').onclick = function() {
    if(typeof tocarSomClique==='function') tocarSomClique();
    window.location.href='game.html';
};
document.getElementById('btn-home').onclick = function() {
    if(typeof tocarSomClique==='function') tocarSomClique();
    window.location.href='index.html';
};

// CSS do confete
var s=document.createElement('style');
s.textContent='@keyframes confeteCair{to{transform:translateY(105dvh) rotate(720deg);opacity:0}}';
document.head.appendChild(s);
</script>
</body>
</html>
