<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Amigos - Fim de Jogo</title>
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/highscores.css">
</head>
<body>
    <div class="container flex-center flex-column">
        <main id="end" class="flex-center flex-column">
            <h1 id="finalScore">0</h1>
            <p>Parabéns! Você completou o desafio!</p>
            
            <div class="avatar-final-container">
                <img id="foto-final" src="img/avatar-padrao.png" alt="Avatar do Jogador">
                <h2 id="nome-final">Jogador</h2>
            </div>

            <div class="menu-final">
                <button class="btn" id="btnReiniciar">Jogar Novamente</button>
                <button class="btn" id="btnHome">Menu Inicial</button>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs (Versão 8 para compatibilidade) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <!-- Scripts de Lógica -->
    <script src="js/firebase.js"></script>
    <script src="js/voz.js"></script>
    <script src="js/sons.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const finalScoreElement = document.getElementById("finalScore");
            const nomeFinalElement = document.getElementById("nome-final");
            const fotoFinalElement = document.getElementById("foto-final");
            const btnReiniciar = document.getElementById("btnReiniciar");
            const btnHome = document.getElementById("btnHome");

            // 1. RECUPERAR DADOS DO LOCALSTORAGE
            const mostRecentScore = localStorage.getItem("mostRecentScore") || 0;
            const nomeUsuario = localStorage.getItem("nomeJogador") || "Amigo";
            const fotoSalva = localStorage.getItem("fotoJogador") || "img/avatar-padrao.png";
            const materia = localStorage.getItem("materiaAtual") || "Soma";

            // 2. ATUALIZAR INTERFACE
            finalScoreElement.innerText = mostRecentScore;
            nomeFinalElement.innerText = nomeUsuario;
            fotoFinalElement.src = fotoSalva;

            // 3. SALVAMENTO FINAL NO FIREBASE (Backup de Segurança)
            if (typeof salvarProgresso === "function") {
                // Salva o score final como fase 30 (Concluído)
                salvarProgresso(nomeUsuario, 30, parseInt(mostRecentScore));
                console.log("[SISTEMA]: Score final sincronizado com Firebase.");
            }

            // 4. FEEDBACK DE VOZ
            if (typeof falar === "function") {
                falar(`Parabéns ${nomeUsuario}! Você fez ${mostRecentScore} pontos em ${materia}!`);
            }

            // 5. NAVEGAÇÃO
            btnReiniciar.onclick = () => {
                if (typeof tocarSom === "function") tocarSom('clique');
                window.location.href = "game.html";
            };

            btnHome.onclick = () => {
                if (typeof tocarSom === "function") tocarSom('sair');
                window.location.href = "index.html";
            };
        });
    </script>
</body>
</html>
