<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <!-- RESPONSIVO ACESSÍVEL -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mundo dos Amigos - Parabéns!</title>

    <link rel="stylesheet" href="css/app.css">

    <style>
        .celebracao-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(to bottom, #f0f9ff, #e0f2fe);
            text-align: center;
        }

        .coroa-img {
            width: 150px;
            margin-bottom: 20px;
            animation: flutuar 2s infinite ease-in-out;
        }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .nome-vencedor {
            font-size: 2.5rem;
            color: #0369a1;
            margin: 10px 0;
        }

        .btn-voltar {
            width: 80%;
            padding: 25px;
            background-color: #0ea5e9;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 30px;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
            cursor: pointer;
        }

        .btn-voltar:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>

<div class="celebracao-container">

    <!-- IMAGEM -->
    <img 
        src="img/coroa.png" 
        class="coroa-img" 
        alt="Coroa de mestre conquistada"
    >

    <!-- TÍTULO -->
    <h1 style="font-size: 1.5rem; color: #64748b;">
        VOCÊ CONSEGUIU!
    </h1>

    <!-- NOME -->
    <h2 
        id="nomeDisplay" 
        class="nome-vencedor"
        aria-live="polite"
    >
        Jogador
    </h2>

    <!-- SCORE -->
    <p style="font-size: 1.2rem;">
        Pontuação Final: 
        <span id="scoreFinal" style="font-weight: bold;">
            0
        </span>
    </p>

    <!-- BOTÃO -->
    <button 
        class="btn-voltar" 
        onclick="jogarNovamente()"
        aria-label="Jogar novamente"
    >
        JOGAR NOVAMENTE
    </button>

</div>

<!-- VOZ PADRÃO -->
<script src="js/voz.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const nome = localStorage.getItem("nomeJogador") || "Amigo";
    const score = localStorage.getItem("mostRecentScore") || 0;

    const elNome = document.getElementById("nomeDisplay");
    const elScore = document.getElementById("scoreFinal");

    // ===============================
    // ATUALIZA UI
    // ===============================
    if (elNome) elNome.innerText = nome;
    if (elScore) elScore.innerText = score;

    // ===============================
    // NARRAÇÃO FINAL (CORRETA)
    // ===============================
    if (typeof falar === "function") {
        setTimeout(() => {
            falar(`Parabéns ${nome}! Você é um mestre da matemática!`, "festa");
        }, 300);
    }

});

/**
 * VOLTAR AO INÍCIO
 */
function jogarNovamente() {
    try {
        if (typeof tocarSom === "function") {
            tocarSom('home');
        }
    } catch {}

    setTimeout(() => {
        window.location.href = "index.html";
    }, 300);
}
</script>

</body>
</html>
