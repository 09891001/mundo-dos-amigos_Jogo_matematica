<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4F46E5">
    <title>Mundo dos Amigos — Jogar</title>
    <link rel="stylesheet" href="css/game.css">
    <style>
        body { opacity:0; transition:opacity .3s ease; }
        body.loaded { opacity:1; }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header-game">
    <button class="btn-sair" id="btnSair" aria-label="Sair do jogo">← Sair</button>
    <div class="header-right">
        <button id="btn-mudo" aria-label="Liga/desliga som">🔊</button>
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
            <img id="foto-jogador" src="img/avatar-padrao.png" alt="Foto" class="foto-perfil-hud">
            <span id="conquistas-count">🏆 0</span>
        </div>
    </div>
</header>

<!-- JOGO -->
<main class="container">

    <!-- HUD -->
    <section id="hud" aria-label="Informações">
        <div class="hud-row">
            <p id="progressText">Fase 1/30</p>
            <div style="display:flex;gap:12px;align-items:center;">
                <p>⭐ <span id="estrelas">0</span></p>
                <p>🎯 <span id="score">0</span></p>
            </div>
        </div>
        <div id="progressBar" role="progressbar" aria-valuemin="1" aria-valuemax="30" aria-label="Progresso">
            <div id="progressBarFull"></div>
        </div>
        <div id="combo-display" aria-live="polite"></div>
    </section>

    <!-- PERGUNTA -->
    <h2 id="question" tabindex="-1" aria-live="assertive">Carregando...</h2>

    <!-- ÁREA DE OBJETOS VISUAIS -->
    <section id="area-ajuda-visual"
             aria-live="polite"
             aria-label="Objetos para contar"
             class="area-ajuda-base">
    </section>

    <!-- RESPOSTAS -->
    <section id="choices" class="choices-grid" aria-label="Escolha a resposta">
        <div class="choice-container" role="button" tabindex="0" aria-label="Opção 1"><p class="choice-text">?</p></div>
        <div class="choice-container" role="button" tabindex="0" aria-label="Opção 2"><p class="choice-text">?</p></div>
        <div class="choice-container" role="button" tabindex="0" aria-label="Opção 3"><p class="choice-text">?</p></div>
        <div class="choice-container" role="button" tabindex="0" aria-label="Opção 4"><p class="choice-text">?</p></div>
    </section>

</main>

<!-- Scripts: ordem importa! -->
<script src="js/sons.js"></script>
<script src="js/voz.js"></script>
<script src="js/apoio.js"></script>
<script src="js/conquistas.js"></script>
<script src="js/game.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Foto de perfil
    var foto = localStorage.getItem('fotoJogador') || 'img/avatar-padrao.png';
    var fotoEl = document.getElementById('foto-jogador');
    if (fotoEl) fotoEl.src = foto;

    // Atualiza contador de conquistas
    function atualizarConq() {
        var el = document.getElementById('conquistas-count');
        if (el) el.textContent = '🏆 ' + JSON.parse(localStorage.getItem('conquistas')||'[]').length;
    }
    atualizarConq();
    setInterval(atualizarConq, 1200);

    // Botão mudo
    var btnMudo = document.getElementById('btn-mudo');
    function sincMudo() {
        if (btnMudo) btnMudo.textContent = localStorage.getItem('mutado')==='true' ? '🔇' : '🔊';
    }
    if (btnMudo) {
        btnMudo.onclick = function() {
            if (typeof toggleMudo === 'function') toggleMudo();
            sincMudo();
        };
    }
    sincMudo();

    // Botão sair
    var btnSair = document.getElementById('btnSair');
    if (btnSair) {
        btnSair.addEventListener('click', function() {
            if (confirm('Sair do jogo? O progresso desta partida será perdido.')) {
                if (typeof tocarSomClique==='function') tocarSomClique();
                if (typeof pararVoz==='function') pararVoz();
                document.body.classList.add('fade-out');
                setTimeout(function(){ window.location.href='index.html'; }, 320);
            }
        });
    }

    // Fade-in de entrada
    document.body.classList.add('loaded');
});
</script>
</body>
</html>
