<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Amigos - Jogando</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body class="tema-nivel-1">

    <!-- 🔥 BOTÃO REDUNDANTE REMOVIDO: O sistema agora desbloqueia no toque em qualquer lugar -->

    <header class="header-game">
        <button class="btn-sair" id="btnSair" aria-label="Sair do jogo">Sair</button>
        <img id="foto-jogador" src="img/avatar-padrao.png" alt="Foto do jogador" class="foto-perfil-hud">
    </header>

    <main class="container">
        <section id="hud">
            <div class="hud-item">
                <p id="progressText">Fase 1/30</p>
                <div id="progressBar">
                    <div id="progressBarFull"></div>
                </div>
            </div>
            <div class="hud-item">
                <p>Pontos: <span id="score">0</span></p>
                <p>⭐ <span id="estrelas">0</span></p>
            </div>
        </section>

        <h2 id="question">Carregando...</h2>

        <section id="area-ajuda-visual" aria-live="polite">
            <!-- Área reservada para os emojis de ajuda pedagógica -->
        </section>

        <section id="game" class="choices-grid">
            <div class="choice-container" data-number="0" role="button" tabindex="0">
                <p class="choice-text">0</p>
            </div>
            <div class="choice-container" data-number="0" role="button" tabindex="0">
                <p class="choice-text">0</p>
            </div>
            <div class="choice-container" data-number="0" role="button" tabindex="0">
                <p class="choice-text">0</p>
            </div>
            <div class="choice-container" data-number="0" role="button" tabindex="0">
                <p class="choice-text">0</p>
            </div>
        </section>
    </main>

    <!-- Scripts na ordem correta de dependência -->
    <script src="js/sons.js"></script>
    <script src="js/voz.js"></script>
    <script src="js/game.js"></script>

    <script>
        /**
         * AJUSTES DE INTERFACE ESPECÍFICOS DA PÁGINA (LIMPO)
         */
        document.addEventListener("DOMContentLoaded", () => {
            const btnSair = document.getElementById("btnSair");
            const fotoHud = document.getElementById("foto-jogador");

            // 1. Desbloqueio automático gerenciado pelo sons.js via 'pointerdown'
            // O código redundante do btnAudio foi removido com sucesso.

            // 2. Carregar foto do perfil salva
            const fotoSalva = localStorage.getItem("fotoJogador") || "img/avatar-padrao.png";
            if (fotoHud) fotoHud.src = fotoSalva;

            // 3. Controle do botão Sair
            if (btnSair) {
                btnSair.addEventListener("click", () => {
                    if (confirm("Deseja mesmo sair? Seu progresso atual não será salvo.")) {
                        window.location.href = "index.html";
                    }
                });
            }
        });
    </script>
</body>
</html>
