<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Amigos - Jogando</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body class="tema-nivel-1">

    <header class="header-game">
        <button class="btn-sair" id="btnSair" aria-label="Sair do jogo">Sair</button>
        <img id="foto-jogador" src="img/avatar-padrao.png" alt="Foto do jogador" class="foto-perfil-hud">
    </header>

    <main class="container">
        <section id="hud" aria-label="Informações do jogo">
            <div class="hud-item">
                <p id="progressText">Fase 1/30</p>
                <div id="progressBar" role="progressbar" aria-valuemin="1" aria-valuemax="30">
                    <div id="progressBarFull"></div>
                </div>
            </div>
            <div class="hud-item">
                <p>Pontos: <span id="score">0</span></p>
                <p>⭐ <span id="estrelas">0</span></p>
            </div>
        </section>

        <h2 id="question" tabindex="-1" aria-live="assertive">Carregando pergunta...</h2>

        <section id="area-ajuda-visual" aria-live="assertive" aria-label="Ajuda visual da conta">
            </section>

        <section id="choices-area" role="group" aria-label="Opções de resposta">
            <div class="choice-container" data-number="0" role="button" tabindex="0">
                <p class="choice-text">0</p>
            </div>
            <div class="choice-container" data-number="0" role="button" tabindex="0">
                <p class="choice-text">0</p>
            </div>
            <div class="choice-container" data-number="0" role="button" tabindex="0">
                <p class="choice-text">0</p>
            </div>
            <div class="choice-container" data-number="0" role="button" tabindex="0">
                <p class="choice-text">0</p>
            </div>
        </section>
    </main>

    <script src="js/sons.js"></script>
    <script src="js/voz.js"></script>
    <script src="js/game.js"></script>

    <script>
        /**
         * LÓGICA DE INTERFACE DA PÁGINA
         */
        document.addEventListener("DOMContentLoaded", () => {
            const btnSair = document.getElementById("btnSair");
            const fotoHud = document.getElementById("foto-jogador");

            // 1. Carregar foto do perfil do LocalStorage
            const fotoSalva = localStorage.getItem("fotoJogador") || "img/avatar-padrao.png";
            if (fotoHud) {
                fotoHud.src = fotoSalva;
            }

            // 2. Controle do botão Sair com confirmação e feedback sonoro
            if (btnSair) {
                btnSair.addEventListener("click", () => {
                    if (confirm("Deseja mesmo sair? Seu progresso nesta partida não será salvo.")) {
                        if (typeof sons !== 'undefined' && sons.sair) {
                            sons.sair.play().catch(() => {});
                        }
                        window.location.href = "index.html";
                    }
                });
            }
        });
    </script>
</body>
</html>
