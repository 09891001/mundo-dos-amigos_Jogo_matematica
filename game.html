<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo dos Amigos - Jogando</title>
    
    <!-- CAMINHOS RELATIVOS CORRIGIDOS (./) -->
    <link rel="stylesheet" href="./css/app.css">
    <link rel="stylesheet" href="./css/game.css">
</head>
<body class="tema-nivel-1">

    <div id="loader" class="flex-center">
        <div class="spinner"></div>
        <p>A preparar o jogo...</p>
    </div>

    <main id="game" class="container hidden">
        
        <header class="header-game">
            <!-- Botão com som e redirecionamento relativo -->
            <button class="btn-sair" id="btnSair" aria-label="Sair do jogo">Sair</button>
            <div class="perfil-mini">
                <img id="foto-perfil-jogo" src="./img/avatar-padrao.png" alt="Sua foto" onerror="this.src='./img/avatar-padrao.png'">
            </div>
        </header>

        <section class="hud-container">
            <div class="hud-item">
                <p id="progressText" class="hud-prefix">Fase 1/30</p>
                <div id="progressBar">
                    <div id="progressBarFull"></div>
                </div>
            </div>
            <div class="hud-item">
                <p class="hud-prefix">Pontos</p>
                <h2 id="score">0</h2>
            </div>
        </section>

        <section class="question-container">
            <h2 id="question">A carregar...</h2>
        </section>

        <section id="choices-container" class="flex-column">
            <!-- Respostas em formato de cápsula para toque -->
            <div class="choice-container" role="button" tabindex="0">
                <p class="choice-prefix">A</p>
                <p class="choice-text" data-number="1"></p>
            </div>
            <div class="choice-container" role="button" tabindex="0">
                <p class="choice-prefix">B</p>
                <p class="choice-text" data-number="2"></p>
            </div>
            <div class="choice-container" role="button" tabindex="0">
                <p class="choice-prefix">C</p>
                <p class="choice-text" data-number="3"></p>
            </div>
            <div class="choice-container" role="button" tabindex="0">
                <p class="choice-prefix">D</p>
                <p class="choice-text" data-number="4"></p>
            </div>
        </section>

    </main>

    <!-- SCRIPTS COM CAMINHOS RELATIVOS (ORDEM DE DEPENDÊNCIA) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="./js/firebase.js"></script>
    <script src="./js/voz.js"></script>
    <script src="./js/sons.js"></script>
    <script src="./js/vibracao.js"></script>
    <script src="./js/apoio.js"></script>
    
    <!-- O motor do jogo deve ser o último -->
    <script src="./js/game.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        // Recupera a foto salva no index.html
        const fotoSalva = localStorage.getItem("fotoJogador");
        const imgPerfil = document.getElementById("foto-perfil-jogo");
        if (fotoSalva && imgPerfil) {
            imgPerfil.src = fotoSalva;
        }

        // Lógica do botão sair com som e redirecionamento relativo
        const btnSair = document.getElementById("btnSair");
        if (btnSair) {
            btnSair.addEventListener("click", (e) => {
                e.preventDefault();
                if (typeof tocarSom === "function") tocarSom('sair');
                if (typeof pararTodasAsFalas === "function") pararTodasAsFalas();

                setTimeout(() => {
                    window.location.href = './index.html';
                }, 500);
            });
        }
    });
    </script>

</body>
</html>
