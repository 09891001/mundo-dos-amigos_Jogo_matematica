<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Amigos - Jogando</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body class="tema-nivel-1">

    <button id="ativarAudioGame" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        z-index: 9999;
        border: none;
        background: transparent;
    "></button>

    <header class="header-game">
        <button class="btn-sair" id="btnSair">Sair</button>
        <img id="foto-perfil-jogo" src="img/avatar-padrao.png" alt="Foto do jogador">
    </header>

    <main class="game-container">
        <section id="hud">
            <p id="progressText">Fase 1/30</p>
            <p>Pontos: <span id="score">0</span></p>
        </section>

        <div id="progressBar">
            <div id="progressBarFull"></div>
        </div>

        <h2 id="question">Carregando...</h2>

        <section id="game" class="flex-center flex-column">
            <div class="choice-container" data-number="0">
                <p class="choice-text">0</p>
            </div>
            <div class="choice-container" data-number="0">
                <p class="choice-text">0</p>
            </div>
            <div class="choice-container" data-number="0">
                <p class="choice-text">0</p>
            </div>
            <div class="choice-container" data-number="0">
                <p class="choice-text">0</p>
            </div>
        </section>
    </main>

    <script src="js/preload.js"></script>
    <script src="js/voz.js"></script>
    <script src="js/sons.js"></script>
    <script src="js/vibracao.js"></script>
    <script src="js/game.js"></script>

    <script>
        // 1. DESBLOQUEIO TÁTIL (Obrigatório para iOS/Safari)
        const btnAudioGame = document.getElementById("ativarAudioGame");

        if (btnAudioGame) {
            btnAudioGame.addEventListener("click", () => {
                // Libera o hardware de áudio e sintetizador de voz
                if (typeof liberarAudio === "function") liberarAudio();
                if (typeof liberarVoz === "function") liberarVoz();

                // Remove a camada para permitir interação com o jogo abaixo
                btnAudioGame.remove();
                console.log("[SISTEMA]: Áudio desbloqueado pelo usuário.");
            });
        }

        // 2. INTERFACE E NAVEGAÇÃO
        document.addEventListener("DOMContentLoaded", () => {
            const btnSair = document.getElementById("btnSair");
            const foto = document.getElementById("foto-perfil-jogo");

            // Recupera foto do perfil
            const fotoSalva = localStorage.getItem("fotoJogador") || "img/avatar-padrao.png";
            if (foto) foto.src = fotoSalva;

            if (btnSair) {
                btnSair.addEventListener("click", () => {
                    // Toca som de saída se disponível e volta para o menu
                    if (typeof tocarSom === "function") tocarSom('sair');
                    setTimeout(() => window.location.href = "index.html", 300);
                });
            }
        });
    </script>
</body>
</html>
